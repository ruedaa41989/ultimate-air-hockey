<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Air Hockey</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }
  canvas {
    display: block;
    max-width: 100vw;
    max-height: 100vh;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const BASE_W = 1000;
const BASE_H = 600;
canvas.width = BASE_W;
canvas.height = BASE_H;

// Scale canvas to fit window
function resizeCanvas() {
  const scale = Math.min(window.innerWidth / BASE_W, window.innerHeight / BASE_H);
  canvas.style.width = (BASE_W * scale) + 'px';
  canvas.style.height = (BASE_H * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Constants
const WIDTH = 1000, HEIGHT = 600, FPS = 60;
const PUCK_RADIUS = 10, PADDLE_RADIUS = 30, MAX_SCORE = 7;
const PUCK_FRICTION = 0.995, GOAL_HEIGHT = 160, BARRIER = 20;

// Colors
const WHITE = '#ffffff', BLACK = '#141419';
const BLUE = '#50a0ff', RED = '#ff5050';
const ICE = '#aad2ff', YELLOW = '#ffdc64';
const GREEN = '#78ff78', PURPLE = '#d278ff';

// Input
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

// State
let screenShake = 0;
let rinkGlow = 0;
let gameState = 'menu'; // 'menu', 'difficulty', 'game'
let mode = '2P', difficulty = 'medium';

// ---- PARTICLE ----
class Particle {
  constructor(x, y, color = YELLOW) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 7;
    this.x = x; this.y = y;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 20 + Math.random() * 20 | 0;
    this.color = color;
  }
  update() { this.x += this.vx; this.y += this.vy; this.life--; }
  draw() {
    if (this.life <= 0) return;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ---- POWERUP ----
class PowerUp {
  constructor() {
    this.x = 200 + Math.random() * 600;
    this.y = 120 + Math.random() * 360;
    this.type = ['speed', 'big', 'slow'][Math.floor(Math.random() * 3)];
    this.radius = 15;
    this.life = 600;
    this.pulse = 0;
  }
  update() { this.life--; this.pulse = (this.pulse + 0.1) % (Math.PI * 2); }
  draw() {
    const color = { speed: GREEN, big: PURPLE, slow: YELLOW }[this.type];
    const r = this.radius + Math.sin(this.pulse) * 3;
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.fillStyle = BLACK;
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = { speed: '⚡', big: '◉', slow: '❄' }[this.type];
    ctx.fillText(label, this.x, this.y);
  }
}

// ---- PUCK ----
class Puck {
  constructor() { this.trail = []; this.spin = 0; this.reset(); }
  reset() {
    this.x = WIDTH / 2; this.y = HEIGHT / 2;
    this.vx = (Math.random() < 0.5 ? -1 : 1) * 7;
    this.vy = (Math.random() - 0.5) * 6;
    this.spin = 0; this.trail = [];
  }
  move() {
    this.x += this.vx; this.y += this.vy;
    this.vy += this.spin * 0.02;
    this.vx *= PUCK_FRICTION; this.vy *= PUCK_FRICTION;
    this.spin *= 0.98;
    if (this.y <= BARRIER + PUCK_RADIUS) { this.y = BARRIER + PUCK_RADIUS; this.vy *= -1; this.spin *= -1; }
    if (this.y >= HEIGHT - BARRIER - PUCK_RADIUS) { this.y = HEIGHT - BARRIER - PUCK_RADIUS; this.vy *= -1; this.spin *= -1; }
    const gt = (HEIGHT - GOAL_HEIGHT) / 2, gb = gt + GOAL_HEIGHT;
    if (this.x <= PUCK_RADIUS && !(this.y > gt && this.y < gb)) { this.x = PUCK_RADIUS; this.vx *= -1; }
    if (this.x >= WIDTH - PUCK_RADIUS && !(this.y > gt && this.y < gb)) { this.x = WIDTH - PUCK_RADIUS; this.vx *= -1; }
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 14) this.trail.shift();
  }
  draw() {
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const size = PUCK_RADIUS * (i / 14);
      ctx.fillStyle = `rgba(80,80,100,${i / 14 * 0.5})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = '#222228';
    ctx.beginPath();
    ctx.arc(this.x, this.y, PUCK_RADIUS, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

// ---- PADDLE ----
class Paddle {
  constructor(x, y, color, controls = null, ai = false, diff = 'medium') {
    this.x = x; this.y = y; this.color = color;
    this.controls = controls; this.ai = ai; this.difficulty = diff;
    this.radius = PADDLE_RADIUS; this.speed = 7;
    this.prevX = x; this.prevY = y;
    this.powerTimer = 0;
  }
  move(puck) {
    this.prevX = this.x; this.prevY = this.y;
    if (this.ai) { this.aiMove(puck); }
    else if (this.controls) {
      if (keys[this.controls.up])    this.y -= this.speed;
      if (keys[this.controls.down])  this.y += this.speed;
      if (keys[this.controls.left])  this.x -= this.speed;
      if (keys[this.controls.right]) this.x += this.speed;
    }
    this.restrict();
    if (this.powerTimer > 0) { this.powerTimer--; }
    else { this.radius = PADDLE_RADIUS; this.speed = 7; }
  }
  restrict() {
    this.y = Math.max(BARRIER + this.radius, Math.min(HEIGHT - BARRIER - this.radius, this.y));
    if (this.x < WIDTH / 2) {
      this.x = Math.max(this.radius, Math.min(WIDTH / 2 - this.radius, this.x));
    } else {
      this.x = Math.max(WIDTH / 2 + this.radius, Math.min(WIDTH - this.radius, this.x));
    }
  }
  aiMove(puck) {
    const reaction = { easy: 3, medium: 5, hard: 8 }[this.difficulty];
    if (puck.x > WIDTH / 2 - 50) {
      const targetY = puck.y + puck.vy * 5;
      if (targetY > this.y) this.y += reaction;
      else if (targetY < this.y) this.y -= reaction;
    }
    this.restrict();
  }
  draw() {
    ctx.save();
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 15;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 0.55, 0, Math.PI * 2);
    ctx.stroke();
  }
}

// ---- COLLISION ----
function puckCollision(puck, paddle) {
  const dx = puck.x - paddle.x, dy = puck.y - paddle.y;
  const dist = Math.hypot(dx, dy);
  if (dist < PUCK_RADIUS + paddle.radius) {
    const angle = Math.atan2(dy, dx);
    const pvx = paddle.x - paddle.prevX, pvy = paddle.y - paddle.prevY;
    const speed = 10 + Math.hypot(pvx, pvy);
    puck.vx = Math.cos(angle) * speed;
    puck.vy = Math.sin(angle) * speed;
    puck.spin = pvy * 2;
    screenShake = 8;
  }
}

// ---- DRAW RINK ----
function drawRink() {
  rinkGlow = (rinkGlow + 2) % 360;
  const glow = Math.sin(rinkGlow * Math.PI / 180) * 30 + 30;
  ctx.fillStyle = ICE;
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  // Center line
  ctx.strokeStyle = 'rgba(200,60,60,0.5)';
  ctx.lineWidth = 4;
  ctx.setLineDash([10, 8]);
  ctx.beginPath(); ctx.moveTo(WIDTH / 2, 0); ctx.lineTo(WIDTH / 2, HEIGHT); ctx.stroke();
  ctx.setLineDash([]);

  // Center circle
  ctx.save();
  ctx.strokeStyle = `rgb(255,${100 + glow | 0},100)`;
  ctx.lineWidth = 5;
  ctx.shadowColor = `rgb(255,${100 + glow | 0},100)`;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(WIDTH / 2, HEIGHT / 2, 80, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  // Goals
  const gt = (HEIGHT - GOAL_HEIGHT) / 2;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, gt, 12, GOAL_HEIGHT);
  ctx.fillRect(WIDTH - 12, gt, 12, GOAL_HEIGHT);

  // Goal outlines
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.strokeRect(0, gt, 12, GOAL_HEIGHT);
  ctx.strokeRect(WIDTH - 12, gt, 12, GOAL_HEIGHT);

  // Top & bottom barriers
  ctx.fillStyle = '#181820';
  ctx.fillRect(0, 0, WIDTH, BARRIER);
  ctx.fillRect(0, HEIGHT - BARRIER, WIDTH, BARRIER);

  // Rink border shine
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 3;
  ctx.strokeRect(0, BARRIER, WIDTH, HEIGHT - BARRIER * 2);
}

// ---- DRAW SCORE ----
function drawScore(s1, s2) {
  ctx.fillStyle = 'rgba(30,30,40,0.5)';
  ctx.font = 'bold 60px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(`${s1}   ${s2}`, WIDTH / 2, 28);
}

// ---- MENUS ----
function drawMenu() {
  ctx.fillStyle = BLACK;
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  // Title
  ctx.save();
  ctx.shadowColor = BLUE; ctx.shadowBlur = 30;
  ctx.fillStyle = WHITE;
  ctx.font = 'bold 62px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('ULTIMATE AIR HOCKEY', WIDTH / 2, 160);
  ctx.restore();

  // Buttons
  drawButton(WIDTH / 2, 310, 320, 54, '1  —  Two Players', BLUE);
  drawButton(WIDTH / 2, 385, 320, 54, '2  —  Player vs AI', RED);

  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '18px Arial';
  ctx.fillText('P1: WASD  |  P2: Arrow Keys', WIDTH / 2, 470);
  ctx.fillText('Press 1 or 2 to start', WIDTH / 2, 500);
}

function drawDifficultyMenu() {
  ctx.fillStyle = BLACK;
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  ctx.save();
  ctx.shadowColor = YELLOW; ctx.shadowBlur = 20;
  ctx.fillStyle = WHITE;
  ctx.font = 'bold 54px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Select Difficulty', WIDTH / 2, 150);
  ctx.restore();

  drawButton(WIDTH / 2, 290, 260, 54, '1  —  Easy', GREEN);
  drawButton(WIDTH / 2, 365, 260, 54, '2  —  Medium', YELLOW);
  drawButton(WIDTH / 2, 440, 260, 54, '3  —  Hard', RED);
}

function drawButton(x, y, w, h, label, color) {
  ctx.save();
  ctx.shadowColor = color; ctx.shadowBlur = 15;
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  roundRect(x - w / 2, y - h / 2, w, h, 10);
  ctx.fill(); ctx.stroke();
  ctx.restore();
  ctx.fillStyle = color;
  ctx.font = 'bold 22px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ---- GAME ----
let puck, p1, p2, score1, score2, particles, powerups, spawnTimer, paused, goalAnim, goalColor, winner;

function initGame() {
  puck = new Puck();
  p1 = new Paddle(120, HEIGHT / 2, BLUE, { up: 'KeyW', down: 'KeyS', left: 'KeyA', right: 'KeyD' });
  if (mode === 'AI') {
    p2 = new Paddle(WIDTH - 120, HEIGHT / 2, RED, null, true, difficulty);
  } else {
    p2 = new Paddle(WIDTH - 120, HEIGHT / 2, RED, { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' });
  }
  score1 = 0; score2 = 0;
  particles = []; powerups = [];
  spawnTimer = 0; paused = false;
  goalAnim = 0; goalColor = BLUE; winner = null;
}

function updateGame() {
  if (paused || winner) return;

  if (goalAnim > 0) { goalAnim--; return; }

  p1.move(puck); p2.move(puck);
  puck.move();
  puckCollision(puck, p1); puckCollision(puck, p2);

  // Scoring
  const gt = (HEIGHT - GOAL_HEIGHT) / 2, gb = gt + GOAL_HEIGHT;
  if (puck.x < 0 && puck.y > gt && puck.y < gb) {
    score2++; triggerGoal(RED);
  } else if (puck.x > WIDTH && puck.y > gt && puck.y < gb) {
    score1++; triggerGoal(BLUE);
  }

  // Powerups
  spawnTimer++;
  if (spawnTimer > 600) { powerups.push(new PowerUp()); spawnTimer = 0; }

  for (let i = powerups.length - 1; i >= 0; i--) {
    const pw = powerups[i];
    pw.update();
    if (pw.life <= 0) { powerups.splice(i, 1); continue; }
    if (Math.hypot(puck.x - pw.x, puck.y - pw.y) < PUCK_RADIUS + pw.radius) {
      applyPowerup(pw);
      powerups.splice(i, 1);
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    if (particles[i].life <= 0) particles.splice(i, 1);
  }

  if (screenShake > 0) screenShake--;

  if (score1 >= MAX_SCORE) winner = 'BLUE WINS!';
  if (score2 >= MAX_SCORE) winner = 'RED WINS!';
}

function triggerGoal(color) {
  screenShake = 15; goalColor = color; goalAnim = 90;
  for (let i = 0; i < 60; i++) particles.push(new Particle(puck.x, puck.y, color));
  puck.reset();
}

function applyPowerup(pw) {
  if (pw.type === 'speed') { puck.vx *= 1.8; puck.vy *= 1.8; }
  else if (pw.type === 'big') { p1.radius = 50; p1.powerTimer = 400; }
  else if (pw.type === 'slow') { p2.speed = 3; p2.powerTimer = 400; }
}

function drawGame() {
  const shakeX = screenShake > 0 ? (Math.random() - 0.5) * 8 : 0;
  const shakeY = screenShake > 0 ? (Math.random() - 0.5) * 8 : 0;
  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawRink();
  powerups.forEach(pw => pw.draw());
  particles.forEach(p => p.draw());
  puck.draw();
  p1.draw(); p2.draw();
  drawScore(score1, score2);

  if (goalAnim > 0) {
    const alpha = Math.min(1, goalAnim / 20);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = goalColor; ctx.shadowBlur = 40;
    ctx.fillStyle = goalColor;
    ctx.font = 'bold 80px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('GOAL!', WIDTH / 2, HEIGHT / 2);
    ctx.restore();
  }

  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    ctx.save();
    ctx.shadowColor = WHITE; ctx.shadowBlur = 20;
    ctx.fillStyle = WHITE;
    ctx.font = 'bold 70px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('PAUSED', WIDTH / 2, HEIGHT / 2 - 30);
    ctx.restore();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '22px Arial';
    ctx.fillText('R — Restart   |   M — Menu   |   P — Resume', WIDTH / 2, HEIGHT / 2 + 40);
  }

  if (winner) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    const wcolor = winner.startsWith('BLUE') ? BLUE : RED;
    ctx.save();
    ctx.shadowColor = wcolor; ctx.shadowBlur = 40;
    ctx.fillStyle = YELLOW;
    ctx.font = 'bold 72px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(winner, WIDTH / 2, HEIGHT / 2 - 40);
    ctx.restore();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '24px Arial';
    ctx.fillText('Space — Play Again   |   M — Menu', WIDTH / 2, HEIGHT / 2 + 40);
  }

  ctx.restore();
}

// ---- INPUT HANDLING ----
document.addEventListener('keydown', e => {
  if (gameState === 'menu') {
    if (e.code === 'Digit1') { mode = '2P'; gameState = 'game'; initGame(); }
    if (e.code === 'Digit2') { gameState = 'difficulty'; }
  } else if (gameState === 'difficulty') {
    if (e.code === 'Digit1') { mode = 'AI'; difficulty = 'easy'; gameState = 'game'; initGame(); }
    if (e.code === 'Digit2') { mode = 'AI'; difficulty = 'medium'; gameState = 'game'; initGame(); }
    if (e.code === 'Digit3') { mode = 'AI'; difficulty = 'hard'; gameState = 'game'; initGame(); }
  } else if (gameState === 'game') {
    if (e.code === 'KeyP' && !winner) paused = !paused;
    if (e.code === 'KeyR') { initGame(); }
    if (e.code === 'KeyM') { gameState = 'menu'; }
    if (e.code === 'Space' && winner) { initGame(); }
  }
});

// Touch controls for mobile
let touchP1 = null, touchP2 = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const rect = canvas.getBoundingClientRect();
    const scale = BASE_W / rect.width;
    const tx = (t.clientX - rect.left) * scale;
    if (tx < WIDTH / 2) touchP1 = { id: t.identifier, x: tx, y: (t.clientY - rect.top) * scale };
    else touchP2 = { id: t.identifier, x: tx, y: (t.clientY - rect.top) * scale };
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const rect = canvas.getBoundingClientRect();
    const scale = BASE_W / rect.width;
    const tx = (t.clientX - rect.left) * scale;
    const ty = (t.clientY - rect.top) * scale;
    if (touchP1 && t.identifier === touchP1.id) { touchP1.x = tx; touchP1.y = ty; }
    if (touchP2 && t.identifier === touchP2.id) { touchP2.x = tx; touchP2.y = ty; }
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (touchP1 && t.identifier === touchP1.id) touchP1 = null;
    if (touchP2 && t.identifier === touchP2.id) touchP2 = null;
  }
});

// Apply touch controls to paddles
function applyTouchToPaddles() {
  if (!p1 || !p2) return;
  if (touchP1) {
    const dx = touchP1.x - p1.x, dy = touchP1.y - p1.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 2) {
      p1.x += (dx / dist) * Math.min(dist, p1.speed);
      p1.y += (dy / dist) * Math.min(dist, p1.speed);
      p1.restrict();
    }
  }
  if (touchP2 && mode !== 'AI') {
    const dx = touchP2.x - p2.x, dy = touchP2.y - p2.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 2) {
      p2.x += (dx / dist) * Math.min(dist, p2.speed);
      p2.y += (dy / dist) * Math.min(dist, p2.speed);
      p2.restrict();
    }
  }
}

// ---- MAIN LOOP ----
let lastTime = 0;
function loop(timestamp) {
  const dt = timestamp - lastTime;
  if (dt >= 1000 / FPS) {
    lastTime = timestamp;
    ctx.clearRect(0, 0, WIDTH, HEIGHT);

    if (gameState === 'menu') {
      drawMenu();
    } else if (gameState === 'difficulty') {
      drawDifficultyMenu();
    } else if (gameState === 'game') {
      applyTouchToPaddles();
      updateGame();
      drawGame();
    }
  }
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
